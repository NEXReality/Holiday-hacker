<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Holiday Hacker Onboarding</title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="page" id="page">
    <div class="blob-primary" aria-hidden="true"></div>
    <div class="blob-secondary" aria-hidden="true"></div>

    <header class="header">
      <div class="header-inner">
        <div class="logo-ring">
          <div class="logo-inner">
            <span class="material-symbols-outlined logo-icon">flight_takeoff</span>
          </div>
        </div>
        <div>
          <h1 class="brand-title">Holiday Hacker</h1>
          <div class="online-row">
            <span class="online-dot"></span>
            <span class="online-label">Online</span>
          </div>
        </div>
      </div>
    </header>

    <div class="chat-area no-scrollbar" id="chatArea"></div>

    <div class="chat-footer" id="chatFooter">
      <div class="chat-privacy">
        <span class="material-symbols-outlined">lock</span>
        Your data stays on this device
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
